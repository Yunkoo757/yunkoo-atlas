<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Option A - Range first sidebar</title>
  <style>
    :root {
      --app: #eeece6;
      --sidebar: #f8f7f3;
      --main: #ffffff;
      --ink: #202124;
      --muted: #6f746d;
      --soft: #90978d;
      --line: #dedbd3;
      --selected: #dce9e3;
      --selected-ink: #1f5f50;
      --hover: #efeee9;
      --green: #2f6f5e;
      --red: #b4533c;
      --amber: #b7791f;
      --blue: #4267a7;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--app);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .frame {
      width: min(1180px, 100%);
      height: min(760px, calc(100vh - 48px));
      min-height: 620px;
      display: grid;
      grid-template-columns: 224px minmax(0, 1fr);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--main);
      box-shadow: 0 22px 60px rgba(34, 32, 28, .12);
    }
    aside {
      background: var(--sidebar);
      border-right: 1px solid var(--line);
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }
    .workspace {
      height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      font-size: 13px;
      font-weight: 700;
    }
    .avatar {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      color: #172015;
      background: #f2c94c;
      font-size: 11px;
    }
    .nav-section {
      display: grid;
      gap: 2px;
    }
    .section-label {
      padding: 0 8px;
      height: 22px;
      display: flex;
      align-items: center;
      color: var(--soft);
      font-size: 11px;
      font-weight: 700;
    }
    .nav-item {
      height: 30px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      border-radius: 8px;
      color: #3b3d39;
      font-size: 13px;
      text-decoration: none;
    }
    .nav-item:hover { background: var(--hover); }
    .nav-item.active {
      background: var(--selected);
      color: var(--selected-ink);
      font-weight: 720;
    }
    .nav-item .count {
      margin-left: auto;
      color: var(--soft);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--soft);
      flex: none;
    }
    .dot.green { background: var(--green); }
    .dot.red { background: var(--red); }
    .dot.amber { background: var(--amber); }
    .dot.blue { background: var(--blue); }
    .spacer { flex: 1; }
    main {
      min-width: 0;
      display: grid;
      grid-template-rows: 54px minmax(0, 1fr);
      background: var(--main);
    }
    header {
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      gap: 16px;
    }
    .title-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .subtitle {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: none;
    }
    .seg {
      display: inline-flex;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f5f4ef;
    }
    .seg button {
      border: 0;
      background: transparent;
      border-radius: 6px;
      width: 34px;
      height: 26px;
      font-size: 15px;
      color: var(--muted);
    }
    .seg button.active {
      background: #ffffff;
      color: var(--ink);
      box-shadow: 0 1px 3px rgba(32, 33, 36, .12);
    }
    .ghost-btn {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 0 10px;
      color: #39403a;
      font-size: 13px;
    }
    .board {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr));
      gap: 12px;
      overflow: auto;
    }
    .column {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfaf7;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }
    .col-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .card {
      border: 1px solid #e7e3da;
      background: #fff;
      border-radius: 8px;
      padding: 10px;
      min-height: 82px;
    }
    .ticker {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-weight: 760;
      font-size: 13px;
    }
    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .pnl { color: var(--green); font-weight: 720; }
    @media (max-width: 820px) {
      body { padding: 0; }
      .frame {
        width: 100%;
        height: 100vh;
        min-height: 0;
        border: 0;
        border-radius: 0;
        grid-template-columns: 188px minmax(0, 1fr);
      }
      .board { grid-template-columns: repeat(2, minmax(160px, 1fr)); }
      .subtitle { display: none; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <aside>
      <div class="workspace"><span class="avatar">Y</span><span>Yunkoo</span></div>
      <div class="nav-section">
        <div class="section-label">交易</div>
        <a class="nav-item" href="#"><span class="dot"></span><span>全部交易</span><span class="count">128</span></a>
        <a class="nav-item active" href="#"><span class="dot green"></span><span>进行中</span><span class="count">18</span></a>
        <a class="nav-item" href="#"><span class="dot amber"></span><span>星标交易</span><span class="count">9</span></a>
        <a class="nav-item" href="#"><span class="dot red"></span><span>错过的机会</span><span class="count">6</span></a>
        <a class="nav-item" href="#"><span class="dot blue"></span><span>模拟</span><span class="count">22</span></a>
      </div>
      <div class="nav-section">
        <div class="section-label">分析</div>
        <a class="nav-item" href="#"><span class="dot"></span><span>仪表盘</span></a>
      </div>
      <div class="spacer"></div>
      <div class="nav-section">
        <a class="nav-item" href="#"><span class="dot"></span><span>设置</span></a>
      </div>
    </aside>
    <main>
      <header>
        <div class="title-row">
          <h1>进行中</h1>
          <span class="subtitle">计划中 + 持仓中 · 实盘</span>
        </div>
        <div class="controls">
          <div class="seg" aria-label="视图">
            <button type="button" title="列表">☰</button>
            <button type="button" class="active" title="看板">▦</button>
          </div>
          <button class="ghost-btn" type="button">显示</button>
        </div>
      </header>
      <section class="board">
        <div class="column">
          <div class="col-head"><span>计划中</span><span>5</span></div>
          <div class="card"><div class="ticker"><span>NVDA</span><span>Long</span></div><div class="meta">突破回踩 · AI 基建</div></div>
          <div class="card"><div class="ticker"><span>MSFT</span><span>Long</span></div><div class="meta">财报前观察 · 云业务</div></div>
        </div>
        <div class="column">
          <div class="col-head"><span>持仓中</span><span>8</span></div>
          <div class="card"><div class="ticker"><span>TSLA</span><span class="pnl">+2.1R</span></div><div class="meta">趋势延续 · 已上移止损</div></div>
          <div class="card"><div class="ticker"><span>META</span><span class="pnl">+0.7R</span></div><div class="meta">平台突破 · 等量能确认</div></div>
        </div>
        <div class="column">
          <div class="col-head"><span>复盘中</span><span>3</span></div>
          <div class="card"><div class="ticker"><span>AMD</span><span>-0.3R</span></div><div class="meta">未按计划减仓</div></div>
        </div>
        <div class="column">
          <div class="col-head"><span>已完成</span><span>2</span></div>
          <div class="card"><div class="ticker"><span>AAPL</span><span class="pnl">+1.4R</span></div><div class="meta">按规则止盈</div></div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
