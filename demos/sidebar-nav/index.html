<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sidebar navigation demos</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f5f2;
      --panel: #ffffff;
      --ink: #202124;
      --muted: #6f746d;
      --line: #dedbd3;
      --accent: #2f6f5e;
      --danger: #b4533c;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 32px;
    }
    main {
      width: min(920px, 100%);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0;
    }
    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }
    a {
      display: block;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: inherit;
      text-decoration: none;
    }
    a:hover {
      border-color: #b9c9c1;
      box-shadow: 0 12px 28px rgba(32, 33, 36, 0.08);
    }
    .kicker {
      display: block;
      margin-bottom: 10px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .title {
      display: block;
      margin-bottom: 8px;
      font-size: 17px;
      font-weight: 720;
    }
    .desc {
      display: block;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }
    @media (max-width: 760px) {
      body { padding: 18px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <h1>左侧导航方案 demo</h1>
    <p>三个 HTML 都是独立静态稿，可以直接打开比较侧栏逻辑。</p>
    <div class="grid">
      <a href="./option-a-range-first.html">
        <span class="kicker">Option A</span>
        <span class="title">范围优先</span>
        <span class="desc">左侧只切数据范围；列表/看板留在顶栏。推荐方向。</span>
      </a>
      <a href="./option-b-sectioned-sidebar.html">
        <span class="kicker">Option B</span>
        <span class="title">分组侧栏</span>
        <span class="desc">保留更多入口，但用分区和计数降低混乱。</span>
      </a>
      <a href="./option-c-context-detail.html">
        <span class="kicker">Option C</span>
        <span class="title">详情上下文</span>
        <span class="desc">重点看详情页如何保留来源与返回路径。</span>
      </a>
    </div>
  </main>
</body>
</html>
