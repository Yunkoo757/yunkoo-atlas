<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Option C - Detail keeps context</title>
  <style>
    :root {
      --app: #f0eee9;
      --sidebar: #f8f7f3;
      --main: #ffffff;
      --ink: #202124;
      --muted: #6f746d;
      --soft: #90978d;
      --line: #dedbd3;
      --selected: #dce9e3;
      --selected-ink: #1f5f50;
      --hover: #efeee9;
      --green: #2f6f5e;
      --red: #b4533c;
      --amber: #b7791f;
      --blue: #4267a7;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--app);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .frame {
      width: min(1180px, 100%);
      height: min(760px, calc(100vh - 48px));
      min-height: 620px;
      display: grid;
      grid-template-columns: 224px minmax(0, 1fr);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--main);
      box-shadow: 0 22px 60px rgba(34, 32, 28, .12);
    }
    aside {
      background: var(--sidebar);
      border-right: 1px solid var(--line);
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }
    .workspace {
      height: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      font-size: 13px;
      font-weight: 700;
    }
    .avatar {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      color: #172015;
      background: #f2c94c;
      font-size: 11px;
    }
    .section {
      display: grid;
      gap: 2px;
    }
    .section-label {
      padding: 0 8px;
      height: 22px;
      display: flex;
      align-items: center;
      color: var(--soft);
      font-size: 11px;
      font-weight: 720;
    }
    .item {
      height: 30px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 8px;
      border-radius: 8px;
      color: #3b3d39;
      font-size: 13px;
      text-decoration: none;
    }
    .item:hover { background: var(--hover); }
    .item.active {
      background: var(--selected);
      color: var(--selected-ink);
      font-weight: 720;
    }
    .item.context {
      outline: 1px solid #b9d5c9;
      outline-offset: -1px;
    }
    .count {
      margin-left: auto;
      color: var(--soft);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--soft);
      flex: none;
    }
    .dot.green { background: var(--green); }
    .dot.red { background: var(--red); }
    .dot.amber { background: var(--amber); }
    .dot.blue { background: var(--blue); }
    .context-box {
      border: 1px solid #cddcd5;
      background: #eef6f1;
      border-radius: 8px;
      padding: 10px;
      margin: 0 4px;
    }
    .context-title {
      color: var(--selected-ink);
      font-size: 12px;
      font-weight: 760;
      margin-bottom: 8px;
    }
    .context-action {
      height: 28px;
      width: 100%;
      border: 1px solid #b9d5c9;
      border-radius: 7px;
      background: #ffffff;
      color: var(--selected-ink);
      font-size: 12px;
      font-weight: 700;
    }
    .spacer { flex: 1; }
    main {
      min-width: 0;
      display: grid;
      grid-template-rows: 54px minmax(0, 1fr);
    }
    header {
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      gap: 16px;
    }
    .crumbs {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
    }
    .crumbs b {
      color: var(--ink);
      font-size: 17px;
    }
    .ghost-btn {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 0 10px;
      color: #39403a;
      font-size: 13px;
    }
    .detail {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 288px;
      gap: 16px;
      padding: 16px;
      overflow: auto;
    }
    .sheet, .rail {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      min-width: 0;
    }
    .sheet { padding: 18px; }
    .rail { padding: 14px; height: fit-content; background: #fbfaf7; }
    .trade-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 18px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 3px 7px;
      color: var(--muted);
      font-size: 12px;
      background: #fbfaf7;
    }
    .metric {
      text-align: right;
      font-size: 13px;
      color: var(--muted);
    }
    .metric b {
      display: block;
      margin-bottom: 4px;
      color: var(--green);
      font-size: 20px;
    }
    .notes {
      margin-top: 18px;
      display: grid;
      gap: 12px;
      color: #383b36;
      font-size: 14px;
      line-height: 1.6;
    }
    .rail h2 {
      margin: 0 0 12px;
      font-size: 14px;
      letter-spacing: 0;
    }
    .activity {
      display: grid;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    .activity div {
      border-bottom: 1px solid #e8e4dc;
      padding-bottom: 10px;
    }
    @media (max-width: 900px) {
      body { padding: 0; }
      .frame {
        width: 100%;
        height: 100vh;
        min-height: 0;
        border: 0;
        border-radius: 0;
        grid-template-columns: 190px minmax(0, 1fr);
      }
      .detail { grid-template-columns: 1fr; }
      .rail { display: none; }
    }
  </style>
</head>
<body>
  <div class="frame">
    <aside>
      <div class="workspace"><span class="avatar">Y</span><span>Yunkoo</span></div>
      <div class="context-box">
        <div class="context-title">来自：进行中 · 看板</div>
        <button class="context-action" type="button">返回当前看板</button>
      </div>
      <div class="section">
        <div class="section-label">交易</div>
        <a class="item" href="#"><span class="dot"></span><span>全部交易</span><span class="count">128</span></a>
        <a class="item active context" href="#"><span class="dot green"></span><span>进行中</span><span class="count">18</span></a>
        <a class="item" href="#"><span class="dot amber"></span><span>星标交易</span><span class="count">9</span></a>
        <a class="item" href="#"><span class="dot red"></span><span>错过的机会</span><span class="count">6</span></a>
        <a class="item" href="#"><span class="dot blue"></span><span>模拟</span><span class="count">22</span></a>
      </div>
      <div class="section">
        <div class="section-label">分析</div>
        <a class="item" href="#"><span class="dot"></span><span>仪表盘</span></a>
      </div>
      <div class="spacer"></div>
      <div class="section">
        <a class="item" href="#"><span class="dot"></span><span>设置</span></a>
      </div>
    </aside>
    <main>
      <header>
        <div class="crumbs"><span>进行中</span><span>/</span><span>TSLA</span><span>/</span><b>交易详情</b></div>
        <button class="ghost-btn" type="button">编辑</button>
      </header>
      <section class="detail">
        <article class="sheet">
          <div class="trade-head">
            <div>
              <h1>TSLA · Long</h1>
              <div class="tags"><span class="tag">趋势突破</span><span class="tag">持仓中</span><span class="tag">高信心</span></div>
            </div>
            <div class="metric"><b>+2.1R</b><span>浮动盈亏</span></div>
          </div>
          <div class="notes">
            <p>突破后第一次回踩买入，量能维持在 20 日均量上方。当前计划是把止损移动到前一根日线低点下方。</p>
            <p>如果明天不能延续强势，先减仓一半，剩余仓位按趋势跟踪处理。</p>
          </div>
        </article>
        <aside class="rail">
          <h2>时间线</h2>
          <div class="activity">
            <div>06-19 09:40 · 上移止损</div>
            <div>06-18 14:22 · 加入进行中</div>
            <div>06-18 10:12 · 开仓记录创建</div>
          </div>
        </aside>
      </section>
    </main>
  </div>
</body>
</html>
