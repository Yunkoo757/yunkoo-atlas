services:
  api:
    build: .
    restart: unless-stopped
    environment:
      ATLAS_SYNC_TOKEN: ${ATLAS_SYNC_TOKEN:?ATLAS_SYNC_TOKEN is required}
      ATLAS_SYNC_DATABASE: /data/atlas-sync.db
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      SYNC_DOMAIN: ${SYNC_DOMAIN:?SYNC_DOMAIN is required}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
