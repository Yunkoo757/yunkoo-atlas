name: Full QA

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 1-5'

permissions:
  contents: read

concurrency:
  group: full-qa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: windows-latest
    timeout-minutes: 45
    env:
      QA_PERFORMANCE_PROFILE: hosted-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Electron runtime
        run: pnpm exec install-electron

      - name: Restore Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Run complete release quality gate
        run: pnpm qa:full

      - name: Run forced-kill process gate
        run: pnpm test:forced-kill:electron

      - name: Upload forced-kill evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forced-kill-full-qa
          path: test-results/forced-kill/*.json
          if-no-files-found: error
          retention-days: 30

      - name: Run real persistence SLO gate
        run: pnpm benchmark:persistence:release

      - name: Upload persistence benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persistence-benchmark-release
          path: |
            test-results/persistence-benchmark/persistence-release.json
            test-results/persistence-benchmark/web-zip-release.json
            test-results/persistence-benchmark/persistence-release-gate.json
            test-results/qa-release-full.json
          if-no-files-found: error
          retention-days: 30
