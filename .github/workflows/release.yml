name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Electron runtime
        run: pnpm exec install-electron

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Generate app icon assets
        run: pnpm icons:app

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match package version v$version"
          }

      - name: Build application
        run: pnpm build:app

      - name: Run Electron library QA
        run: pnpm qa:electron

      - name: Build Windows installer
        run: pnpm exec electron-builder --win nsis --x64 --publish never

      - name: Publish private GitHub Release (Windows assets)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "${{ github.ref_name }}"
          $installer = Get-Item "release/Yunkoo-Atlas-$version-win-x64.exe"
          $blockmap = Get-Item "$($installer.FullName).blockmap"
          $metadata = Get-Item "release/latest.yml"
          $files = @($installer, $blockmap, $metadata)

          foreach ($file in $files) {
            if ($file.Length -le 0) { throw "Release asset is empty: $($file.Name)" }
          }

          $isPrerelease = $version.Contains('-')
          $releaseTitle = if ($isPrerelease) { "Yunkoo Atlas $version (Preview)" } else { "Yunkoo Atlas $version" }
          $releaseChannel = if ($isPrerelease) { '预览版：不会进入正式版自动更新通道' } else { '正式版' }
          $notes = @"
          ## 发布通道
          - $releaseChannel

          ## Windows
          - NSIS 安装包（支持应用内更新）

          ## macOS
          - DMG / ZIP（arm64 + x64）由同工作流随后上传
          - 当前为未公证构建，需右键打开或在隐私与安全性中允许
          - 应用内自动更新仍仅支持 Windows NSIS
          "@
          $releaseArgs = @('release', 'create', $tag, '--verify-tag', '--title', $releaseTitle)
          if ($isPrerelease) { $releaseArgs += @('--prerelease', '--latest=false') }
          $releaseArgs += @('--notes', $notes, $installer.FullName, $blockmap.FullName, $metadata.FullName)
          $assetPaths = @($files | ForEach-Object FullName)

          gh release view $tag --json id *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          if ($releaseExists) {
            $editArgs = @('release', 'edit', $tag, '--title', $releaseTitle, '--notes', $notes)
            if ($isPrerelease) {
              $editArgs += @('--prerelease', '--latest=false')
            } else {
              $editArgs += '--prerelease=false'
            }
            & gh @editArgs
            if ($LASTEXITCODE -ne 0) { throw "Failed to update release $tag" }
            gh release upload $tag @assetPaths --clobber
            if ($LASTEXITCODE -ne 0) { throw "Failed to upload release assets for $tag" }
          } else {
            & gh @releaseArgs
            if ($LASTEXITCODE -ne 0) { throw "Failed to create release $tag" }
          }

          $release = gh release view $tag --json isDraft,isPrerelease,assets | ConvertFrom-Json
          if ($release.isDraft) { throw "Release $tag is still a draft" }
          if ([bool]$release.isPrerelease -ne $isPrerelease) {
            throw "Release prerelease state does not match version $version"
          }
          $assetNames = @($release.assets | ForEach-Object name)
          foreach ($file in $files) {
            if ($assetNames -notcontains $file.Name) {
              throw "Release asset missing: $($file.Name)"
            }
          }

  build-macos:
    needs: build-windows
    runs-on: macos-latest
    timeout-minutes: 75
    env:
      # 未配置 Apple 开发者证书时跳过签名，产出可手动安装的 DMG/ZIP
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Electron runtime
        run: pnpm exec install-electron

      - name: Generate app icon assets
        run: pnpm icons:app

      - name: Verify tag matches package version
        run: |
          version=$(node -p "require('./package.json').version")
          if [ "v$version" != "${{ github.ref_name }}" ]; then
            echo "Tag ${{ github.ref_name }} does not match package version v$version"
            exit 1
          fi

      - name: Build application
        run: pnpm build:app

      - name: Build macOS DMG and ZIP
        run: pnpm exec electron-builder --mac dmg zip --x64 --arm64 --publish never

      - name: Upload macOS assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          tag="${{ github.ref_name }}"
          files=(
            release/Yunkoo-Atlas-"$version"-mac-arm64.dmg
            release/Yunkoo-Atlas-"$version"-mac-arm64.zip
            release/Yunkoo-Atlas-"$version"-mac-x64.dmg
            release/Yunkoo-Atlas-"$version"-mac-x64.zip
          )
          for file in "${files[@]}"; do
            if [ ! -s "$file" ]; then
              echo "Required macOS release asset is missing or empty: $file"
              ls -la release || true
              exit 1
            fi
          done
          gh release upload "$tag" "${files[@]}" --clobber
          asset_names=$(gh release view "$tag" --json assets --jq '.assets[].name')
          for file in "${files[@]}"; do
            base=$(basename "$file")
            echo "$asset_names" | grep -Fxq "$base" || {
              echo "Release asset missing after upload: $base"
              exit 1
            }
          done
