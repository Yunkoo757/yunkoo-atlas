name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Electron runtime
        run: pnpm exec install-electron

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Build Web application
        run: pnpm build

      - name: Run release quality gate
        run: pnpm qa:full

      - name: Run real persistence SLO gate
        run: pnpm benchmark:persistence:release

      - name: Run executable Release Train drills
        run: pnpm verify:release-train-drills

      - name: Run approved JSON compatibility corpus
        run: pnpm measure:json-compatibility

      - name: Upload persistence benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persistence-benchmark-release
          path: |
            test-results/persistence-benchmark/persistence-release.json
            test-results/persistence-benchmark/web-zip-release.json
            test-results/persistence-benchmark/persistence-release-gate.json
            test-results/qa-release-full.json
            test-results/quality-execution.json
            test-results/quality-contract.json
            test-results/release-trains/release-train-drills.json
            test-results/json-compatibility/json-compatibility.json
          if-no-files-found: error
          retention-days: 30

  verify-release-evidence:
    needs: [quality, build-windows, build-macos]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4

      - name: Download quality evidence
        uses: actions/download-artifact@v4
        with:
          name: persistence-benchmark-release
          path: test-results/collected-evidence

      - name: Download forced-kill evidence
        uses: actions/download-artifact@v4
        with:
          pattern: forced-kill-*
          path: test-results/collected-evidence
          merge-multiple: true

      - name: Download asset lifecycle evidence
        uses: actions/download-artifact@v4
        with:
          pattern: asset-lifecycle-*
          path: test-results/collected-evidence
          merge-multiple: true

      - name: Download Electron safety evidence
        uses: actions/download-artifact@v4
        with:
          pattern: electron-safety-*
          path: test-results/collected-evidence
          merge-multiple: true

      - name: Download Generation raw evidence
        uses: actions/download-artifact@v4
        with:
          pattern: generation-spike-*
          path: test-results/collected-evidence
          merge-multiple: true

      - name: Verify cross-platform Generation decision
        run: |
          node scripts/verify-generation-decision.mjs --evidence-root test-results/collected-evidence --require-complete
          cp test-results/generation-spike/generation-decision.json test-results/collected-evidence/generation-decision.json

      - name: Verify all release trains
        run: node scripts/verify-release-train-evidence.mjs --evidence-root test-results/collected-evidence --require-complete

      - name: Upload train recovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: train-recovery-evidence
          path: |
            test-results/release-trains/release-train-evidence.json
            test-results/release-trains/final-quality-manifest.json
          if-no-files-found: error
          retention-days: 30

  build-windows:
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Electron runtime
        run: pnpm exec install-electron

      - name: Build application
        run: pnpm build:app

      - name: Verify forced-kill recovery on Windows
        run: pnpm test:forced-kill:electron

      - name: Verify asset lifecycle on Windows
        run: pnpm test:asset-lifecycle:electron

      - name: Verify Electron safety on Windows
        run: pnpm test:electron-safety:platform

      - name: Run isolated Generation matrix on Windows
        run: pnpm spike:generation

      - name: Upload Windows forced-kill evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forced-kill-Windows
          path: test-results/forced-kill/*.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows asset lifecycle evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asset-lifecycle-Windows
          path: test-results/platform-evidence/asset-lifecycle-*.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows Electron safety evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electron-safety-Windows
          path: test-results/platform-evidence/electron-safety-*.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload Windows Generation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generation-spike-Windows
          path: test-results/generation-spike/generation-spike-windows-*.json
          if-no-files-found: error
          retention-days: 30

      - name: Generate app icon assets
        run: pnpm icons:app

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match package version v$version"
          }

      - name: Build Windows installer
        run: pnpm exec electron-builder --win nsis --x64 --publish never

      - name: Validate Windows assets
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $files = @(
            "release/Trader-Atlas-$version-win-x64.exe",
            "release/Trader-Atlas-$version-win-x64.exe.blockmap",
            "release/latest.yml"
          )
          foreach ($file in $files) {
            if (-not (Test-Path -LiteralPath $file -PathType Leaf)) { throw "Missing release asset: $file" }
            if ((Get-Item -LiteralPath $file).Length -le 0) { throw "Empty release asset: $file" }
          }

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/Trader-Atlas-*-win-x64.exe
            release/Trader-Atlas-*-win-x64.exe.blockmap
            release/latest.yml
          if-no-files-found: error
          retention-days: 7

  build-macos:
    needs: quality
    runs-on: macos-latest
    timeout-minutes: 75
    env:
      # 未配置 Apple 开发者证书时跳过签名，产出可手动安装的 DMG/ZIP。
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Electron runtime
        run: pnpm exec install-electron

      - name: Build application
        run: pnpm build:app

      - name: Verify Electron data path on macOS
        run: pnpm qa:electron

      - name: Verify asset lifecycle on macOS
        run: pnpm test:asset-lifecycle:electron

      - name: Verify forced-kill recovery on macOS
        run: pnpm test:forced-kill:electron

      - name: Verify Electron safety on macOS
        run: pnpm test:electron-safety:platform

      - name: Run isolated Generation matrix on macOS
        run: pnpm spike:generation

      - name: Upload macOS forced-kill evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forced-kill-macOS
          path: test-results/forced-kill/*.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload macOS asset lifecycle evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: asset-lifecycle-macOS
          path: test-results/platform-evidence/asset-lifecycle-*.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload macOS Electron safety evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: electron-safety-macOS
          path: test-results/platform-evidence/electron-safety-*.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload macOS Generation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: generation-spike-macOS
          path: test-results/generation-spike/generation-spike-macos-*.json
          if-no-files-found: error
          retention-days: 30

      - name: Generate app icon assets
        run: pnpm icons:app

      - name: Verify tag matches package version
        run: |
          version=$(node -p "require('./package.json').version")
          if [ "v$version" != "${{ github.ref_name }}" ]; then
            echo "Tag ${{ github.ref_name }} does not match package version v$version"
            exit 1
          fi

      - name: Build macOS DMG and ZIP
        run: pnpm exec electron-builder --mac dmg zip --x64 --arm64 --publish never

      - name: Validate macOS assets
        run: |
          version=$(node -p "require('./package.json').version")
          files=(
            release/Trader-Atlas-"$version"-mac-arm64.dmg
            release/Trader-Atlas-"$version"-mac-arm64.zip
            release/Trader-Atlas-"$version"-mac-x64.dmg
            release/Trader-Atlas-"$version"-mac-x64.zip
          )
          for file in "${files[@]}"; do
            test -s "$file" || { echo "Missing or empty release asset: $file"; exit 1; }
          done

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            release/Trader-Atlas-*-mac-arm64.dmg
            release/Trader-Atlas-*-mac-arm64.zip
            release/Trader-Atlas-*-mac-x64.dmg
            release/Trader-Atlas-*-mac-x64.zip
          if-no-files-found: error
          retention-days: 7

  publish:
    needs: [build-windows, build-macos, verify-release-evidence]
    runs-on: ubuntu-latest
    environment: production-release
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download final quality manifest
        uses: actions/download-artifact@v4
        with:
          name: train-recovery-evidence
          path: test-results/final-quality-evidence

      - name: Verify final quality manifest authorizes this checkout
        run: node scripts/verify-final-quality-manifest.mjs test-results/final-quality-evidence/final-quality-manifest.json

      - name: Download verified build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish complete GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          tag="${{ github.ref_name }}"
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$tag^{commit}" origin/main || {
            echo "Tag commit must be an ancestor of origin/main"
            exit 1
          }
          files=(
            "release-artifacts/Trader-Atlas-$version-win-x64.exe"
            "release-artifacts/Trader-Atlas-$version-win-x64.exe.blockmap"
            "release-artifacts/latest.yml"
            "release-artifacts/Trader-Atlas-$version-mac-arm64.dmg"
            "release-artifacts/Trader-Atlas-$version-mac-arm64.zip"
            "release-artifacts/Trader-Atlas-$version-mac-x64.dmg"
            "release-artifacts/Trader-Atlas-$version-mac-x64.zip"
          )
          expected_names=()
          for file in "${files[@]}"; do
            test -s "$file" || { echo "Missing or empty release asset: $file"; exit 1; }
            expected_names+=("$(basename "$file")")
          done
          node scripts/release-artifacts.mjs manifest release-artifacts "$version" release-manifest.json
          sha256sum "${files[@]}" > release-artifacts/SHA256SUMS.txt

          is_prerelease=false
          release_title="Trader Atlas $version"
          channel_args=(--latest)
          if [[ "$version" == *-* ]]; then
            is_prerelease=true
            release_title="Trader Atlas $version (Preview)"
            channel_args=(--prerelease --latest=false)
          fi

          release_is_draft=true
          mkdir -p existing-assets
          if release_json=$(gh release view "$tag" --json isDraft,isPrerelease,assets 2>/dev/null); then
            jq '{exists: true} + .' <<<"$release_json" > release-state.json
            release_is_draft=$(jq -r '.isDraft' <<<"$release_json")
            existing_prerelease=$(jq -r '.isPrerelease' <<<"$release_json")
            test "$existing_prerelease" = "$is_prerelease" || {
              echo "Existing release channel differs from package version"
              exit 1
            }

            if [[ $(jq '.assets | length' <<<"$release_json") -gt 0 ]]; then
              gh release download "$tag" --dir existing-assets
            fi
            while IFS= read -r existing_name; do
              found=false
              for expected_name in "${expected_names[@]}"; do
                [[ "$existing_name" == "$expected_name" ]] && found=true
              done
              $found || { echo "Unexpected existing release asset: $existing_name"; exit 1; }
            done < <(jq -r '.assets[].name' <<<"$release_json")

            for file in "${files[@]}"; do
              base=$(basename "$file")
              if [[ -e "existing-assets/$base" ]]; then
                local_hash=$(sha256sum "$file" | cut -d' ' -f1)
                remote_hash=$(sha256sum "existing-assets/$base" | cut -d' ' -f1)
                [[ "$local_hash" == "$remote_hash" ]] || {
                  echo "Existing release asset differs: $base"
                  exit 1
                }
              elif [[ "$release_is_draft" != true ]]; then
                echo "Public release is missing required asset: $base"
                exit 1
              fi
            done

            if [[ "$release_is_draft" != true ]]; then
              echo "Release $tag is already public; executable plan will verify no-op state"
            fi
          else
            echo '{"exists":false}' > release-state.json
          fi

          node scripts/release-artifacts.mjs plan \
            release-manifest.json release-state.json existing-assets "$is_prerelease" > release-plan.json
          release_action=$(jq -r '.action' release-plan.json)
          if [[ "$release_action" == noop ]]; then
            echo "Release $tag already public with identical assets"
            exit 0
          fi
          if [[ "$release_action" == create-draft ]]; then
            gh release create "$tag" --verify-tag --draft --title "$release_title" "${channel_args[@]}" --generate-notes
          fi

          for file in "${files[@]}"; do
            base=$(basename "$file")
            [[ -e "existing-assets/$base" ]] || gh release upload "$tag" "$file"
          done

          release_json=$(gh release view "$tag" --json isDraft,isPrerelease,assets)
          [[ $(jq -r '.isDraft' <<<"$release_json") == true ]] || {
            echo "Release became public before verification"
            exit 1
          }
          [[ $(jq '.assets | length' <<<"$release_json") -eq ${#files[@]} ]] || {
            echo "Release asset count is not exactly ${#files[@]}"
            exit 1
          }
          for expected_name in "${expected_names[@]}"; do
            jq -e --arg name "$expected_name" '.assets | any(.name == $name)' <<<"$release_json" >/dev/null || {
              echo "Release asset missing after upload: $expected_name"
              exit 1
            }
          done

      - name: Upload release checksum provenance
        uses: actions/upload-artifact@v4
        with:
          name: release-checksums-${{ github.ref_name }}
          path: |
            release-manifest.json
            release-artifacts/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 90

      - name: Make verified release public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          if [[ $(gh release view "$tag" --json isDraft --jq '.isDraft') == true ]]; then
            gh release edit "$tag" --draft=false
          else
            echo "Release $tag is already public; no-op"
          fi
