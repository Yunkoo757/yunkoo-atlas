name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install chromium

      - name: Run fast quality gate
        run: pnpm qa:ci

      - name: Run real persistence smoke gate
        run: pnpm benchmark:persistence

      - name: Upload persistence smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persistence-benchmark-smoke
          path: test-results/persistence-benchmark/persistence-smoke.json
          if-no-files-found: error
          retention-days: 14
