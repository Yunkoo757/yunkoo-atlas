name: Release Windows

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Electron runtime
        run: pnpm exec install-electron

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match package version v$version"
          }

      - name: Run regression tests
        run: pnpm test

      - name: Build application
        run: pnpm build:app

      - name: Build Windows installer
        run: pnpm exec electron-builder --win nsis --x64 --publish never

      - name: Publish and verify private GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $tag = "${{ github.ref_name }}"
          $installer = Get-Item "release/Yunkoo Atlas-$version-win-x64.exe"
          $blockmap = Get-Item "$($installer.FullName).blockmap"
          $metadata = Get-Item "release/latest.yml"
          $files = @($installer, $blockmap, $metadata)

          foreach ($file in $files) {
            if ($file.Length -le 0) { throw "Release asset is empty: $($file.Name)" }
          }

          gh release create $tag --verify-tag --title "Yunkoo Atlas $version" --notes "Windows NSIS update $version" $installer.FullName $blockmap.FullName $metadata.FullName

          $release = gh release view $tag --json isDraft,assets | ConvertFrom-Json
          if ($release.isDraft) { throw "Release $tag is still a draft" }
          $assetNames = @($release.assets | ForEach-Object name)
          foreach ($file in $files) {
            if ($assetNames -notcontains $file.Name) {
              throw "Release asset missing: $($file.Name)"
            }
          }
